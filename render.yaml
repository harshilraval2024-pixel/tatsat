# Render Blueprint — https://render.com/docs/blueprint-spec
# New Blueprint from repo, or: Web Service → Root Directory: backend (matches rootDir below).

databases:
  - name: solar-estimator-db
    databaseName: solar_estimator
    plan: free

services:
  - type: web
    name: tatsat-solar-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: solar-estimator-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://tatsat.vercel.app,https://tatsat-nrgs.vercel.app,http://localhost:3000,http://127.0.0.1:3000
