# Render Blueprint — https://render.com/docs/blueprint-spec
# New Blueprint from repo, or: Web Service → Root Directory: backend (matches rootDir below).

services:
  - type: web
    name: tatsat-solar-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Runs after build; needs DATABASE_URL* set (add a Postgres resource or paste URLs in the dashboard).
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
